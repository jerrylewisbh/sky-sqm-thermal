# Standalone compose for the labeling tool. Run from the project root:
#   docker compose --env-file deploy/.env -f deploy/docker-compose.labeling.yml up -d
# Sits alongside (does NOT merge into) the existing allsky-cloud-analysis stack.

services:
  labeling-tool:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.labeling
    container_name: labeling-tool
    restart: unless-stopped
    ports:
      # LAN-only bind — ${STREAMLIT_HOST} should be the server's LAN IP.
      - "${STREAMLIT_HOST}:${STREAMLIT_PORT}:8501"
    environment:
      # Inside the container these paths must match the volume mounts below.
      DATASET_ROOT: /data
      DATASET_GLOB: "dataset_v2_*"
      ALLSKY_ROOT: /nas/allsky
    volumes:
      # Read-only: dataset_v2_* generated by host cron jobs.
      - "${PROJECT_DIR}:/data:ro"
      # Read-write: where new hand labels land.
      - "${PROJECT_DIR}/labels:/app/labels:rw"
      # Read-only: full all-sky source for the contextual hemisphere view.
      - "${NAS_ALLSKY_PATH}:/nas/allsky:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
