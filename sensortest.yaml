esphome:
  name: sky-thermal-cam
  platformio_options:
    lib_ldf_mode: deep+
    board_build.f_cpu: 240000000L
    board_build.flash_mode: dout
    upload_speed: 115200

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: external_components_local

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: DEBUG

web_server:
  port: 80

api:
ota:
  - platform: esphome

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_username
  password: !secret mqtt_password
  log_topic: skythermal/logs
  topic_prefix: skythermal
  discovery: false
  birth_message:
    topic: skythermal/status
    payload: online
  will_message:
    topic: skythermal/status
    payload: offline

sky_thermal:
  id: my_sky_thermal
  update_interval: 5s
  # SQM calibration constant. Formula: mpsas = K - 2.5 * log10(lux)
  # Calibrated 2026-05-12 against all-sky camera (18.779 mag/arcsec²) and
  # light-pollution map (18.72) at lux=0.041 — both broadband references
  # match the TSL2591's spectral response better than B-band telescope photometry.
  # Initial B-filter telescope attempt (K=18.64) was wrong because the
  # supplied FITS had been background-subtracted by PixInsight.
  sqm_calibration_k: 15.31
  bme_pressure_offset: 0.0   # 895.50 - 891.60 = 3.9 hPa
  bme_humidity_offset: 0.0   # 34.0% - 27.3% = 6.7%

text_sensor:
  - platform: sky_thermal
    sky_thermal_id: my_sky_thermal
    image:
      name: "Sky Thermal Raw Data"
    sky_condition:
      name: "Sky Condition"

sensor:
  - platform: sky_thermal
    sky_thermal_id: my_sky_thermal
    mean_temp:
      name: "Sky Average Temp"
    min_temp:
      name: "Sky Min Temp"
    max_temp:
      name: "Sky Max Temp"
    center_temp:
      name: "Sky Center Temp"
    bme_temp:
      name: "Ambient Temperature"
    bme_humidity:
      name: "Ambient Humidity"
    bme_pressure:
      name: "Barometric Pressure"
    tsl_illuminance:
      name: "Illuminance"
      accuracy_decimals: 3
    sky_brightness_mpsas:
      name: "Sky Brightness"

# binary_sensor removed as rain sensor was disabled
